[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    -ra
markers =
    unit: Pure logic tests, no external dependencies
    llm: Tests that require a live LLM connection (VPN needed)
    e2e: End-to-end tests requiring LLM + backend (VPN + backend needed)
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
